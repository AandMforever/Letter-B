<!DOCTYPE html>
<html>
<head>
  <title>Letter B</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #2d1b3d, #5a2d82);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }

    .container {
      text-align: center;
      width: 90%;
      max-width: 500px;
    }

    h1 {
      font-size: 34px;
      color: #f5ccff;
      margin-bottom: 5px;
    }

    .subtitle {
      font-size: 15px;
      opacity: 0.8;
      margin-bottom: 40px;
    }

    .card {
      background: rgba(255,255,255,0.08);
      padding: 30px;
      border-radius: 25px;
      backdrop-filter: blur(12px);
      box-shadow: 0 0 30px rgba(255, 102, 204, 0.3);
      transition: 0.4s ease;
    }

    .scramble {
      font-size: 24px;
      letter-spacing: 4px;
      margin-bottom: 20px;
      color: #ffb3ff;
    }

    input {
      padding: 12px;
      border-radius: 12px;
      border: none;
      width: 80%;
      font-size: 16px;
      text-align: center;
    }

    button {
      margin-top: 12px;
      padding: 10px 20px;
      border-radius: 20px;
      border: none;
      background: #ff66cc;
      color: white;
      font-size: 14px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #ff3399;
    }

    .hintBtn {
      background: #b366ff;
    }

    .message {
      margin-top: 18px;
      font-size: 16px;
      opacity: 0;
      transition: 0.5s;
    }

    .hintText {
      margin-top: 15px;
      font-size: 14px;
      opacity: 0.9;
    }

    .final {
      font-size: 24px;
      margin-top: 40px;
      opacity: 0;
      transition: 1.2s ease;
      line-height: 1.6;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>B is for Balanced</h1>
  <div class="subtitle">Unscramble the word to see how we balance each other.</div>

  <div class="card" id="card">
    <div id="scramble" class="scramble"></div>

    <input id="answer" placeholder="Type your answer..." />
    <br>

    <button onclick="checkAnswer()">Submit</button>
    <br>
    <button class="hintBtn" onclick="showHint()">Need a hint?</button>

    <div id="message" class="message"></div>
    <div id="hintText" class="hintText"></div>
  </div>

  <div id="finalMessage" class="final"></div>
</div>

<script>
const words = [
  { 
    scramble: "REVONOHTKNI G", 
    answer: "overthinking", 
    text: "I overthink. You’re helpful.", 
    hint: "Sometimes my mind runs ahead of me..." 
  },
  { 
    scramble: "DAS", 
    answer: "sad", 
    text: "I get sad. You’re cheerful.", 
    hint: "Three letters. When I’m feeling low." 
  },
  { 
    scramble: "DEROB", 
    answer: "bored", 
    text: "I get bored. You’re entertaining.", 
    hint: "Five letters. When nothing feels interesting." 
  },
  { 
    scramble: "DERIT", 
    answer: "tired", 
    text: "I get tired. You’re energetic.", 
    hint: "Five letters. When I need sleep." 
  },
  { 
    scramble: "NWO", 
    answer: "own", 
    text: "", 
    hint: "Three letters. By myself." 
  },
  { 
    scramble: "LEGNA", 
    answer: "angel", 
    text: "", 
    hint: "Five letters. What you are to me." 
  }
];

let current = 0;

function loadWord() {
  document.getElementById("scramble").innerText = words[current].scramble;
  document.getElementById("answer").value = "";
  document.getElementById("message").style.opacity = 0;
  document.getElementById("hintText").innerText = "";
}

function checkAnswer() {
  let userInput = document.getElementById("answer").value.toLowerCase().trim();

  if (userInput === words[current].answer) {

    if (current < 4) {
      document.getElementById("message").innerText = words[current].text;
      document.getElementById("message").style.opacity = 1;
      current++;
      setTimeout(loadWord, 1500);
    } 
    else if (current === 4) {
      current++;
      loadWord();
    }
    else {
      document.getElementById("card").style.display = "none";
      document.getElementById("finalMessage").innerHTML =
        "I was fine on my <span style='color:#ff99ff'>OWN</span>...<br><br>Until I found an <span style='color:#ff66cc'>ANGEL</span> like you.";
      document.getElementById("finalMessage").style.opacity = 1;
    }

  } else {
    document.getElementById("message").innerText = "Not quite… try again 💜";
    document.getElementById("message").style.opacity = 1;
  }
}

function showHint() {
  const answer = words[current].answer;
  const firstTwo = answer.substring(0,2).toUpperCase();
  document.getElementById("hintText").innerHTML =
    words[current].hint + "<br><br>Starts with: <b>" + firstTwo + "</b>";
}

loadWord();
</script>

</body>
</html>
